CONFIG_GPIO=y

CONFIG_BT=y
CONFIG_BT_OBSERVER=y        # passive scanning
CONFIG_BT_DEVICE_NAME="TempReceiver"
CONFIG_BT_EXT_ADV=y          # MUST enable extended advertising support

# CONFIG_BT_CTLR_PHY_CODED=y
# CONFIG_BT_CTLR_ADV_EXT=y

CONFIG_SPI=y
CONFIG_SPI_ASYNC=y
CONFIG_SPI_SLAVE=y

CONFIG_LOG=y
CONFIG_LOG_DEFAULT_LEVEL=3
CONFIG_MAIN_STACK_SIZE=4096
CONFIG_SYSTEM_WORKQUEUE_STACK_SIZE=4096
CONFIG_TIMING_FUNCTIONS=y
CONFIG_CBPRINTF_FP_SUPPORT=y
CONFIG_FPU=y